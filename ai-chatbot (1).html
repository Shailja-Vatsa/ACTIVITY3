<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Studio</title>
    <meta name="description" content="A premium AI chatbot application supporting text and image generation.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar context (optional) or just Header -->
        <header class="app-header">
            <div class="header-title">
                <i class="fa-solid fa-robot"></i>
                <h1>Nexus AI</h1>
            </div>
            <button id="settings-btn" class="icon-btn" title="Settings">
                <i class="fa-solid fa-gear"></i>
            </button>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="welcome-screen" id="welcome-screen">
                <div class="welcome-icon"><i class="fa-solid fa-sparkles"></i></div>
                <h2>Welcome to Nexus AI</h2>
                <p>Configure your API keys in the settings and start chatting or generating images!</p>
            </div>
            <!-- Messages will be injected here -->
        </main>

        <div class="input-area">
            <div class="typing-indicator hidden" id="typing-indicator">
                <span></span><span></span><span></span>
            </div>
            <div class="input-wrapper">
                <textarea id="message-input" placeholder="Message Nexus AI..." rows="1"></textarea>
                <div class="action-buttons">
                    <button id="generate-image-btn" class="primary-btn image-btn" title="Generate Image">
                        <i class="fa-solid fa-image"></i>
                    </button>
                    <button id="send-btn" class="primary-btn" title="Send Message">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay hidden" id="settings-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="close-settings" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="openrouter-key">OpenRouter API Key</label>
                    <input type="password" id="openrouter-key" placeholder="sk-or-v1-...">
                    <small>Required for text generation.</small>
                </div>
                <div class="form-group">
                    <label for="hf-key">Hugging Face Token</label>
                    <input type="password" id="hf-key" placeholder="hf_...">
                    <small>Required for image generation.</small>
                </div>
                <div class="form-group">
                    <label for="text-model">Text Generation Model</label>
                    <input type="text" id="text-model" value="meta-llama/llama-3-8b-instruct">
                    <small>Default OpenRouter model.</small>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings" class="primary-btn">Save Configurations</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
